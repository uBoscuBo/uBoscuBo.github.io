---
layout: default
---

<div class="page-hero">
  <div class="container">
    {% if page.label %}
    <p class="page-hero__label mono">{{ page.label }}</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p>{{ page.description }}</p>
    {% endif %}
  </div>
</div>

<div class="container" style="padding-top: 3rem; padding-bottom: 5rem;">
  {{ content }}
</div>
