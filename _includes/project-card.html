{% assign p = include.project %}
<article class="project-card{% if p.status == 'in-progress' %} in-progress{% endif %}"
         data-tags="{{ p.tags | join: ',' | downcase }}">
  <div class="project-card__image">
    {% if p.image %}
      <img src="{{ p.image | relative_url }}" alt="{{ p.title }} screenshot" loading="lazy">
    {% else %}
      <div class="project-card__placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5"/>
        </svg>
      </div>
    {% endif %}
  </div>

  <div class="project-card__body">
    <div class="project-card__header">
      <h3 class="project-card__title">
        <a href="{{ p.url | relative_url }}">{{ p.title }}</a>
      </h3>
    </div>

    <p class="project-card__desc">{{ p.description }}</p>

    {% if p.tags %}
    <div class="project-card__tags">
      {% for tag in p.tags limit:5 %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}

    <div class="project-card__links">
      {% if p.github %}
      <a href="{{ p.github }}" class="btn btn--sm btn--ghost" target="_blank" rel="noopener" aria-label="View {{ p.title }} on GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/></svg>
        GitHub
      </a>
      {% endif %}
      {% if p.demo %}
      <a href="{{ p.demo }}" class="btn btn--sm btn--primary" target="_blank" rel="noopener" aria-label="View {{ p.title }} live demo">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
        Demo
      </a>
      {% endif %}
      <a href="{{ p.url | relative_url }}" class="btn btn--sm btn--outline">Details →</a>
    </div>
  </div>
</article>
